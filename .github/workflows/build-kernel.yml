name: Build Xperia 10 IV DroidSpaces Kernel

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行
    inputs:
      skip_deploy:
        description: '是否跳过部署步骤？(true/false)'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 优化磁盘空间并安装构建依赖
        run: |
          sudo docker image prune -a -f
          sudo docker container prune -f
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
          gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev \
          libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 克隆当前仓库 (用于获取 patches 目录)
        uses: actions/checkout@v4
      
      - name: 克隆所需环境
        run: |
          echo "克隆源代码"
          git clone -q --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_sony_sm6375.git kernel-src
          echo "=== 克隆 clang 编译器"
          git clone -q --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git clang
      
      - name: 修复编译报错
        if: github.event.inputs.skip_deploy != 'true'
        run: |
          echo "=== 修复找不到 .h 文件的问题"
          cd kernel-src 
          # 使用 find 深度遍历，强行把该目录下所有头文件的 TRACE_INCLUDE_PATH 全部修正
          # 同时，不管三七二十一，把里面所有的 .h 文件全部软链接到内核主树中
          if [ -d techpack/datarmnet/core ]; then
            find techpack/datarmnet/core -type f -name "*.h" | while read -r header; do
              # 修正宏定义路径
              sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../techpack/datarmnet/core|g' "$header"
              
              # 建立绝对路径软链接，防止编译器迷路
              filename=$(basename "$header")
              ln -sf "$GITHUB_WORKSPACE/kernel-src/$header" "include/trace/$filename"
            done
          fi

          echo "==== 验证高通网卡驱动批量修复情况 ===="
          ls -l include/trace/rmnet_trace.h || true
          ls -l include/trace/wda.h || true

      - name: 修复编译报错：高通 ADC5 源码宏冲突
        run: |
          cd kernel-src
          echo "==== 正在精确修正 drivers/iio/adc/qcom-spmi-adc5.c ===="
        
          # 1. 无论源码里现在是带 _QN5965 的老名字，还是少字的新名字，通通强制修正为头文件中合法的 BATT 变量
          sed -i 's/SCALE_HW_CALIB_BATT_THERM_100K_QN5965/SCALE_HW_CALIB_BATT_THERM_100K/g' drivers/iio/adc/qcom-spmi-adc5.c
          sed -i 's/SCALE_HW_CALIB_THERM_100K_QN5965/SCALE_HW_CALIB_BATT_THERM_100K/g' drivers/iio/adc/qcom-spmi-adc5.c
          sed -i 's/SCALE_HW_CALIB_THERM_100K/SCALE_HW_CALIB_BATT_THERM_100K/g' drivers/iio/adc/qcom-spmi-adc5.c
        
          echo "==== 修正完毕 ===="
      
      - name: 应用 DroidSpaces 补丁
        run: |
          cd kernel-src

          PATCH_DIR="$GITHUB_WORKSPACE/patches"
          cp $PATCH_DIR/00*.patch ./
          echo "==== 正在应用 001 kABI 修复补丁 ===="
          patch -p1 < 001-fix_sysvipc.patch
          
          echo "==== 正在应用 002 POSIX Queue 补丁 ===="
          if patch -p1 < 002-posix_mqueue.patch > /dev/null; then
            echo "✌️: 合并成功"
          else
            TARGET_FILE="include/linux/sched/user.h"
            
            # 3. 使用 awk 精准锁定并替换结构体内部的目标行
            # 这种写法完全不依赖系统的 sed 版本差异，对 CI 环境极其友好
            awk '
            /struct ratelimit_state ratelimit;/ {
                print $0;
                print "#if defined(CONFIG_POSIX_MQUEUE)";
                print "\tANDROID_KABI_USE(1, unsigned long mq_bytes);";
                print "\tANDROID_KABI_RESERVE(2);";
                print "\tANDROID_OEM_DATA_ARRAY(1, 2);";
                print "#else";
                print "\tANDROID_KABI_RESERVE(1);";
                print "\tANDROID_KABI_RESERVE(2);";
                print "\tANDROID_OEM_DATA_ARRAY(1, 2);";
                print "#endif";
                
                # 跳过接下来原本要被替换掉的老旧 3 行代码
                skip = 3;
                next;
            }
            {
                if (skip > 0) {
                    skip--;
                } else {
                    print $0;
                }
            }
            ' "$TARGET_FILE" > "${TARGET_FILE}.tmp" && mv "${TARGET_FILE}.tmp" "$TARGET_FILE"
            
            # 4. 验证最终结果
            if grep -q "CONFIG_POSIX_MQUEUE" "$TARGET_FILE"; then
                echo "✅ 修复成功！"
                # 清理残留的补丁拒绝文件
                [ -f "${TARGET_FILE}.rej" ] && rm "${TARGET_FILE}.rej"
                exit 0
            else
                echo "❌ 修复失败，文件内容不匹配。"
                exit 1
            fi
          fi


      - name: 添加 deconfig 文件
        run: |
          cd kernel-src
          echo "==== 开始精准注入 DroidSpaces 核心与推荐配置 ===="
          cat <<EOF > arch/arm64/configs/droidspaces.config
          # IPC
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          
          # Namespaces
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          
          # 核心修复：关闭导致编译失败的高通 ADC5 冲突项
          # 或者强制重置相关 PMIC 标定宏
          CONFIG_SENSORS_QPNP_ADC_VOLTAGE=n
          CONFIG_QCOM_SPMI_ADC5=n
          EOF


          # NixOS / tmpfs support
          # set_config "CONFIG_TMPFS_POSIX_ACL" "y"
          # set_config "CONFIG_TMPFS_XATTR" "y"

      - name: 执行内核编译 (使用 AOSP 交叉编译链)
        run: |
          cd kernel-src
          
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          
          export ARCH=arm64
          export SUBARCH=arm64
          
          # 让构建系统全面使用 Clang 及其 LLVM 工具链
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export LLVM=1 LLVM_IAS=1        
          
          # 2. 生成配置文件
          make O=out gki_defconfig
         
          # 基础GKI 框架 + 高通 holi 专属驱动 + DroidSpaces 修正
          ARCH=arm64 KCONFIG_CONFIG=out/.config ./scripts/kconfig/merge_config.sh -m out/.config \
            arch/arm64/configs/vendor/holi-qgki_defconfig \
            arch/arm64/configs/droidspaces.config
          
          echo "==== 开始多线程编译内核本体 (vmlinux & Image) ===="
          make O=out -j$(nproc) Image || exit 1

          # echo "==== 开始多线程编译外置驱动模块 (允许忽略特定符号未定义) ===="
          # 核心技巧：通过向 KBUILD_EXTRA_SYMBOLS 或 KBUILD_MODPOST_WARN 注入参数
          # 强制让 MODPOST 把 undefined 错误降级为 WARNING 警告，从而顺利生成驱动模块 .ko 文件
          # make O=out -j$(nproc) modules KBUILD_MODPOST_WARN=1 > build_log.txt 2>&1 || EXIT_CODE=$?

          # if [ ! -z "$EXIT_CODE" ]; then
          #   echo "=============================================="
          #   echo "❌ 编译失败！正在为你筛选最关键的报错信息..."
          #   echo "=============================================="
          #   grep -i -C 5 "error:" build_log.txt || tail -n 100 build_log.txt
          #   exit 1
          # else
          #   echo "=============================================="
          #   echo "🎉 编译成功！所有内核与驱动模块链接完毕！"
          #   echo "=============================================="
          # fi
      
      - name: 自动解包原本的 boot.img 并替换新内核
        run: |

          mkdir -p out_artifacts
          echo "=== 收集编译出来的 Image 文件 ==="
          NEW_KERNEL="kernel-src/out/arch/arm64/boot/Image"
          if [ -f "$NEW_KERNEL" ]; then
            cp "$NEW_KERNEL" out_artifacts/Image
            echo "✌️ 内核收集成功"
          else
            echo "❌ 未找到编译生成的内核本体 Image 文件！"
            exit 1
          fi
      
          # echo "=== 收集编译出来的驱动模块 (.ko 文件)==="
          # find kernel-src/out -name "*.ko" -exec cp {} out_artifacts/ \;
          # echo "[+] 驱动模块收集完毕"

      - name: 上传编译包到本运行记录 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Xperia-10IV-DroidSpaces-Kernel
          path: out_artifacts/*
