name: Build Xperia 10 IV DroidSpaces Kernel

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 优化磁盘空间并安装构建依赖
        run: |
          sudo docker image prune -a -f
          sudo docker container prune -f
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 2. 克隆当前仓库 (用于获取 patches 目录)
        uses: actions/checkout@v4

      - name: 3. 克隆 LineageOS 索尼 SM6375 内核源码
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_sony_sm6375.git kernel-src

      - name: 4. 应用本地 patches 文件夹中的 DroidSpaces 补丁
        run: |
          cd kernel-src
          echo "==== 正在应用本地 001-fix_sysvipc.patch ===="
          patch -p1 --verbose < ../patches/001-fix_sysvipc.patch
          
          # 2. 使用 sed 对 include/linux/sched/user.h 进行“外科手术”修改，彻底避免 Hunk FAILED
          echo "==== 正在通过 sed 注入 002 POSIX mqueue 修改 ===="
          
          # 我们需要将:
          # #ifdef CONFIG_POSIX_MQUEUE
          #     /* number of bytes allocated for memory backed mqueues */
          #     unsigned long mq_bytes;    /* protected by mq_lock */
          # #endif
          # 
          # 改造为：当未开启 POSIX_MQUEUE 时，保留 ANDROID_KABI_RESERVE(1) 占位；
          # 开启时，用 mq_bytes 占用这个 reserve(1)，从而保持结构体总大小不变、不破坏 kABI。
          
          # 第一步：先将原本独立的 ANDROID_KABI_RESERVE(1); 替换为带有条件编译保护的代码
          sed -i 's/ANDROID_KABI_RESERVE(1);/#if !defined(CONFIG_POSIX_MQUEUE)\n\tANDROID_KABI_RESERVE(1);\n#endif/' include/linux/sched/user.h
          
          # 第二步：将原有的 CONFIG_POSIX_MQUEUE 声明部分从 depends 限制中解脱出来（如果有的话）
          # 这一步通常在 Kconfig 中，我们在第 5 步中已经通过 gki_defconfig 强制开启，因此只需确保 user.h 结构体对齐。
          
          echo "==== 检查修改后的 user.h 结构体尾部是否正确 ===="
          git diff include/linux/sched/user.h         

      - name: 5. 修改 gki_defconfig 开启容器命名空间
        run: |
          cd kernel-src
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          
          echo "==== 正在向 gki_defconfig 注入 DroidSpaces 必需配置 ===="
          cat <<EOF >> $DEFCONFIG
          
          # === DroidSpaces Custom Configurations ===
          CONFIG_NAMESPACES=y
          CONFIG_PID_NS=y
          CONFIG_IPC_NS=y
          CONFIG_UTS_NS=y
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          CONFIG_SECCOMP=y
          # =========================================
          EOF
          
          # 验证写入情况
          tail -n 12 $DEFCONFIG

      - name: 6. 极速拉取 LineageOS 官方配套 Clang 编译器 (r416183b)
        run: |
          # 直接克隆 20.0 版本的官方预编译工具链， depth=1 保证不拉取历史记录，速度极快
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git clang

      - name: 7. 执行内核编译
        run: |
          cd kernel-src
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          
          MAKE_FLAGS="
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            READELF=llvm-readelf \
            STRIP=llvm-strip
          "
          
          make $MAKE_FLAGS gki_defconfig
          make -j$(nproc) $MAKE_FLAGS

      - name: 8. 收集编译产物
        run: |
          mkdir -p out_artifacts
          if [ -f kernel-src/arch/arm64/boot/Image.gz ]; then
            cp kernel-src/arch/arm64/boot/Image.gz out_artifacts/
          elif [ -f kernel-src/arch/arm64/boot/Image ]; then
            cp kernel-src/arch/arm64/boot/Image out_artifacts/
          fi
          
          if [ -f kernel-src/arch/arm64/boot/dtbo.img ]; then
            cp kernel-src/arch/arm64/boot/dtbo.img out_artifacts/
          fi
          
          find kernel-src/ -name "*.ko" -exec cp {} out_artifacts/ \;

      - name: 9. 上传内核产物到 GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Xperia-10IV-DroidSpaces-Kernel
          path: out_artifacts/*
