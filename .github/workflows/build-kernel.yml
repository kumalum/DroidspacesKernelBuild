name: Build SONY SM6375 Kernel

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

env:
  # clang 编译器选择 google lineage
  CLANG: true
  CLANG_NAME: "lineage"
  LLVM: false
  GKI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 优化磁盘空间并安装构建依赖
        run: |
          sudo docker image prune -a -f
          sudo docker container prune -f
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git libelf-dev liblz4-tool libssl-dev lzop rsync zip zlib1g-dev

      - name: 签出自身
        uses: actions/checkout@v4
        with:
          path: 'droidspaces_kernel'
      
      - name: lineage-clang
        if: env.CLANG && env.CLANG_NAME == 'lineage'
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b'
          fetch-depth: 1
          path: 'clang'

      - name: google-clang
        if: env.CLANG && env.CLANG_NAME == 'google' 
        uses: actions/checkout@v4
        with:
          repository: 'Nicklas373/aosp-clang'
          ref: 'r412851'
          fetch-depth: 1
          path: 'clang'

      - name: 全局变量
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
      
      - name: 设置 clang 环境变量
        if: env.CLANG
        run: |
          echo "$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_PATH
          
          # echo "CC=clang" >> $GITHUB_ENV
          # echo "LD=ld.lld" >> $GITHUB_ENV
          # echo "AR=llvm-ar" >> $GITHUB_ENV
          # echo "NM=llvm-nm" >> $GITHUB_ENV
          # echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
          # echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
          # echo "STRIP=llvm-strip" >> $GITHUB_ENV 
          # echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: 设置 GKI 5.4 及以上内核版本设置 LLVM 编译 
        if: env.GKI
        run: |
          echo "LLVM=1" >> $GITHUB_ENV 
          echo "LLVM_IAS=1" >> $GITHUB_ENV  
          
          # 针对交叉编译的 Target 声明
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV

      - name: LLVM
        if: false
        run: |
          mkdir -p $GITHUB_WORKSPACE/llvm-clang
          cd $GITHUB_WORKSPACE/llvm-clang
          
          echo "==== 正在拉取 LLVM 官方 17.0.6 稳定版工具链 ===="
          curl -L --retry 5 --retry-delay 2 -o llvm-17.tar.xz \
            "https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/clang+llvm-17.0.6-x86_64-linux-gnu-ubuntu-22.04.tar.xz"
          
          echo "==== 正在解压 ===="
          tar -f llvm-17.tar.xz -xJ --strip-components=1 || { echo "❌ 解压失败"; exit 1; }
          rm -f llvm-17.tar.xz
          
          # 验证编译器是否可用
          ./bin/clang --version
          
          # 注入到全局 PATH
          echo "$GITHUB_WORKSPACE/llvm-clang/bin" >> $GITHUB_PATH

      - name: sony sm6375 Kernel srcoure
        uses: actions/checkout@v4
        with:
          repository: 'LineageOS/android_kernel_sony_sm6375'
          ref: 'lineage-23.2'
          fetch-depth: 1
          path: 'kernel-src'

      - name: 编译报错处理
        if: true
        run: |
          cd kernel-src 
          echo "=== [1/2] 修复 WALT 调度器在 O=out 编译时的 trace.h 寻路错误 ==="
          if [ -f kernel/sched/walt/trace.h ]; then
            sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h
            echo "✅ WALT 寻路路径修正成功！"
          fi

          echo "=== [2/2] 修复找不到网卡 .h 文件与 TRACE_INCLUDE_PATH 的问题 ==="
          if [ -d techpack/datarmnet/core ]; then
            find techpack/datarmnet/core -type f -name "*.h" | while read -r header; do
              sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../techpack/datarmnet/core|g' "$header"
              filename=$(basename "$header")
              ln -sf "$GITHUB_WORKSPACE/kernel-src/$header" "include/trace/$filename"
            done
          fi

          echo "==== 验证高通网卡驱动批量修复情况 ===="
          ls -l include/trace/rmnet_trace.h || true
          ls -l include/trace/wda.h || true
          
          echo "=== [3/3] 使用 awk 注入 QN5965 标定宏 ==="
          VADC_HEADER="drivers/iio/adc/qcom-vadc-common.h"
          if [ -f "$VADC_HEADER" ]; then
            # 使用 awk 锁定目标行并在其下方精准插入，不受空格/缩进干扰
            awk '
            /SCALE_HW_CALIB_BATT_THERM_100K,/ {
                print $0;
                print "\tSCALE_HW_CALIB_BATT_THERM_100K_QN5965,";
                print "\tSCALE_HW_CALIB_THERM_100K_QN5965,";
                next;
            }
            { print $0; }
            ' "$VADC_HEADER" > "${VADC_HEADER}.tmp" && mv "${VADC_HEADER}.tmp" "$VADC_HEADER"

            echo "==== 🔍 动态验证头文件修改结果 ===="
            grep -B 1 -A 3 "SCALE_HW_CALIB_BATT_THERM_100K_QN5965" "$VADC_HEADER" || { echo "❌ 注入验证失败！"; exit 1; }
            echo "✅ 宏定义注入成功，且通过 CI 断言验证！"
          else
            echo "❌ 未找到 $VADC_HEADER 头文件"
            exit 1
          fi

          echo "=== [4/4] 🛑 彻底解决 qcom-vadc-common.c 的未使用/重定义冲突 ==="
          VADC_SRC="drivers/iio/adc/qcom-vadc-common.c"
          if [ -f "$VADC_SRC" ]; then
            # 1. 依然在 1641 行对冲突函数进行重命名
            sed -i '1641s/qcom_vadc_scale_hw_calib_batt_therm_100/qcom_vadc_scale_hw_calib_batt_therm_100_sony_murray_only/' "$VADC_SRC"
            
            # 2. 关键一步：在 1641 行前插入 __maybe_unused 属性，堵住编译器的警告
            sed -i '1641s/static int/__maybe_unused static int/' "$VADC_SRC"

            echo "✅ qcom-vadc-common.c 已通过 __maybe_unused 彻底修复！"
          else
            echo "❌ 未找到 $VADC_SRC 源文件"
            exit 1
          fi
          
          echo "=== [5/5] 🔋 修复 step-chg-jeita.c 缺少的 5 参数函数声明 ==="
          JEITA_SRC="drivers/power/supply/qcom/step-chg-jeita.c"
          if [ -f "$JEITA_SRC" ]; then
            # 强行还原文件，洗掉之前错误的 4 参数声明
            git checkout -- "$JEITA_SRC" 2>/dev/null || true
            
            # 使用通用类型 (void *) 和 5 个参数来适配索尼的魔改函数
            # 直接插入到文件的第一行，并前置声明 struct device_node 解决可见性警告
            sed -i '1i struct device_node;\nextern int read_range_data_from_node(struct device_node *node, const char *propname, void *buf, int size, int extra);' "$JEITA_SRC"
            
            echo "✅ step-chg-jeita.c 5参数函数声明修复完毕！"
          else
            echo "❌ 未找到 $JEITA_SRC 源文件"
          fi
          
          echo "=== [6/6] 🔋 终极修复 smb5-lib.c 全局残留的死 goto 标签 ==="
          SMB_SRC="drivers/power/supply/qcom/smb5-lib.c"
          if [ -f "$SMB_SRC" ]; then
            # 1. 强行还原文件，确保洗掉之前按行号修改带来的错位
            git checkout -- "$SMB_SRC" 2>/dev/null || true
            
            # 2. 在文件开头注入 set_sdp_current 的 extern 声明
            sed -i '1i struct smb_charger;\nextern int set_sdp_current(struct smb_charger *chg, int icl_ua);' "$SMB_SRC"
            
            # 3. 🚨 重点：全局替换！把该文件内所有 goto unsuspend; 统统替换为 return rc;
            # 这样不管索尼写了多少个，都能一次性消灭干净，且逻辑完美闭环
            sed -i 's/goto unsuspend;/return rc;/g' "$SMB_SRC"
            
            # 4. 屏蔽未定义的工作队列初始化
            sed -i '/smblib_info_charge_status_work/s/^/\/\/ /' "$SMB_SRC"

            echo "✅ smb5-lib.c 的全局死标签和断层已全部强行修复完毕！"
          else
            echo "❌ 未找到 $SMB_SRC 源文件"
          fi
      
      - name: 应用 DroidSpaces 补丁
        run: |
          cd kernel-src

          PATCH_DIR="$GITHUB_WORKSPACE/droidspaces_kernel/patches"
          cp $PATCH_DIR/00*.patch ./
          echo "==== 正在应用 001 kABI 修复补丁 ===="
          patch -p1 < 001-fix_sysvipc.patch
          
          echo "==== 正在应用 002 POSIX Queue 补丁 ===="
          if patch -p1 < 002-posix_mqueue.patch > /dev/null; then
            echo "✌️: 合并成功"
          else
            TARGET_FILE="include/linux/sched/user.h"
            
            # 3. 使用 awk 精准锁定并替换结构体内部的目标行
            # 这种写法完全不依赖系统的 sed 版本差异，对 CI 环境极其友好
            awk '
            /struct ratelimit_state ratelimit;/ {
                print $0;
                print "#if defined(CONFIG_POSIX_MQUEUE)";
                print "\tANDROID_KABI_USE(1, unsigned long mq_bytes);";
                print "\tANDROID_KABI_RESERVE(2);";
                print "\tANDROID_OEM_DATA_ARRAY(1, 2);";
                print "#else";
                print "\tANDROID_KABI_RESERVE(1);";
                print "\tANDROID_KABI_RESERVE(2);";
                print "\tANDROID_OEM_DATA_ARRAY(1, 2);";
                print "#endif";
                
                # 跳过接下来原本要被替换掉的老旧 3 行代码
                skip = 3;
                next;
            }
            {
                if (skip > 0) {
                    skip--;
                } else {
                    print $0;
                }
            }
            ' "$TARGET_FILE" > "${TARGET_FILE}.tmp" && mv "${TARGET_FILE}.tmp" "$TARGET_FILE"
            
            # 4. 验证最终结果
            if grep -q "CONFIG_POSIX_MQUEUE" "$TARGET_FILE"; then
                echo "✅ 修复成功！"
                # 清理残留的补丁拒绝文件
                [ -f "${TARGET_FILE}.rej" ] && rm "${TARGET_FILE}.rej"
                exit 0
            else
                echo "❌ 修复失败，文件内容不匹配。"
                exit 1
            fi
          fi


      - name: 添加 deconfig 文件
        run: |
          echo "==== 开始精准注入 DroidSpaces 核心与推荐配置 ===="
          cat <<EOF > ./droidspaces.config
          # IPC
          CONFIG_SYSVIPC=y
          CONFIG_POSIX_MQUEUE=y
          
          # Namespaces
          CONFIG_IPC_NS=y
          CONFIG_PID_NS=y
          EOF

          # NixOS / tmpfs support
          # set_config "CONFIG_TMPFS_POSIX_ACL" "y"
          # set_config "CONFIG_TMPFS_XATTR" "y"

      - name: 执行内核编译 (使用 AOSP 交叉编译链)
        run: |
          cd kernel-src
          make mrproper
               
          # 基础GKI 框架 + 高通 holi 专属驱动 + DroidSpaces 修正
          scripts/kconfig/merge_config.sh -m arch/arm64/configs/vendor/holi-qgki_defconfig \
            arch/arm64/configs/diffconfig/common.config \
            ../droidspaces.config
          
          make olddefconfig
          
          echo "==== 开始使用纯 LLVM 多线程编译内核本体 (Image) ===="
          # 使用 tee 将编译日志同时输出到终端和文件，并捕获退出状态
          set -o pipefail
          make -j$(nproc) Image 2>&1 | tee build_output.log || EXIT_CODE=$?
          # 如果编译失败，倒带日志，精准筛选出 error 核心上下文，防止被 GitHub 抹除
          if [ ! -z "$EXIT_CODE" ]; then
            echo "===================================================="
            echo "❌ 编译崩溃！正在为你精准提取引发失败的底层源码报错："
            echo "===================================================="
            grep -B 3 -A 5 -i "error:" build_output.log || tail -n 100 build_output.log
            exit 1
          else
            echo "🎉 内核本体编译成功！"
          fi

          # echo "==== 开始多线程编译外置驱动模块 (允许忽略特定符号未定义) ===="
          # 核心技巧：通过向 KBUILD_EXTRA_SYMBOLS 或 KBUILD_MODPOST_WARN 注入参数
          # 强制让 MODPOST 把 undefined 错误降级为 WARNING 警告，从而顺利生成驱动模块 .ko 文件
          # make O=out -j$(nproc) modules KBUILD_MODPOST_WARN=1 > build_log.txt 2>&1 || EXIT_CODE=$?

          # if [ ! -z "$EXIT_CODE" ]; then
          #   echo "=============================================="
          #   echo "❌ 编译失败！正在为你筛选最关键的报错信息..."
          #   echo "=============================================="
          #   grep -i -C 5 "error:" build_log.txt || tail -n 100 build_log.txt
          #   exit 1
          # else
          #   echo "=============================================="
          #   echo "🎉 编译成功！所有内核与驱动模块链接完毕！"
          #   echo "=============================================="
          # fi
      
      - name: 收集文件
        run: |
          mkdir -p out_artifacts
          
          echo "=== 收集编译出来的 Image 文件 ==="
          NEW_KERNEL="kernel-src/arch/arm64/boot/Image"
          if [ -f "$NEW_KERNEL" ]; then
            cp "$NEW_KERNEL" out_artifacts/Image
            echo "✌️ 内核收集成功"
          else
            echo "❌ 未找到编译生成的内核本体 Image 文件！"
            exit 1
          fi
      
          # echo "=== 收集编译出来的驱动模块 (.ko 文件)==="
          # find kernel-src/out -name "*.ko" -exec cp {} out_artifacts/ \;
          # echo "[+] 驱动模块收集完毕"

      - name: 上传编译包到本运行记录 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Xperia-10IV-DroidSpaces-Kernel
          path: out_artifacts/*
