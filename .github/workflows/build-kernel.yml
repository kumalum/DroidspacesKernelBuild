name: Build Kernel

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

env:
  # clang 编译器选择 google lineage llvm
  CLANG: "google"
  GKI: true
  OUTPATH: "out_artifacts"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
            patches
          fetch-depth: 1
    
      - name: 设置 ubuntu-latest 依赖
        uses: ./.github/depend/ubuntu
      
      - name: clang
        if: env.CLANG
        uses: ./.github/clang

      - name: source_code
        if: true
        uses: ./.github/source
      
      - name: 支持 DroidSpaces 的内核配置
        if: true
        uses: ./.github/droidspaces
      
      - name: bulid kernel
        if: true
        uses: ./.github/bulid
      
      - name: 上传物品
        uses: ./.github/upload
