name: Build Xperia 10 IV DroidSpaces Kernel

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 优化磁盘空间并安装构建依赖
        run: |
          sudo docker image prune -a -f
          sudo docker container prune -f
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 2. 克隆当前仓库 (用于获取 patches 目录)
        uses: actions/checkout@v4
      
      - name: 2.5 克隆 LineageOS 索尼 SM6375 内核源码 (分支 lineage-23.2)
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_sony_sm6375.git kernel-src
      
      - name: 3. 自动应用 DroidSpaces 补丁与 KABI 智能修复
        run: |
          cd kernel-src
          
          PATCH_DIR="../patches"
          if [ ! -d "$PATCH_DIR" ]; then
            echo "❌ 错误：在仓库中未找到 patches 目录 ($PATCH_DIR)！"
            exit 1
          fi

          echo "==== 1. 尝试应用第一个补丁 (SYSVIPC) ===="
          # 001 补丁如果能直接用 git apply/patch 搞定就直接上
          if git apply --check "$PATCH_DIR/001-fix_sysvipc.patch" 2>/dev/null; then
            git apply "$PATCH_DIR/001-fix_sysvipc.patch"
            echo "✅ [001 补丁] 干净合入"
          else
            echo "⚠️ [001 补丁] Git 检测到冲突，尝试用 patch -p1 强行合入..."
            patch -p1 < "$PATCH_DIR/001-fix_sysvipc.patch" || { echo "❌ 001 补丁强制合入也失败！"; exit 1; }
          fi

          echo "==== 2. 智能重构修复第二个补丁 (POSIX_MQUEUE KABI 冲突) ===="
          USER_H="include/linux/sched/user.h"
          
          # 备份原文件以防万一
          cp "$USER_H" "${USER_H}.bak"

          # 检查原文件里有没有 CONFIG_POSIX_MQUEUE 相关的干扰定义并先将其注释/清理，防止重定义冲突
          # Android 内核往往把 mq_bytes 丢在 CONFIG_POSIX_MQUEUE 宏里，我们先用注释避开
          sed -i 's|unsigned long mq_bytes;|// unsigned long mq_bytes; /* DroidSpaces Fix */|g' "$USER_H"

          # 寻找 KABI 预留标志，将 ANDROID_KABI_RESERVE(1) 巧妙替换为使用 KABI 空间的 mq_bytes 定义
          # 这样既启用了变量，又绝对不会破坏原本的 kABI 内存布局
          if grep -q "ANDROID_KABI_RESERVE(1);" "$USER_H"; then
            sed -i 's|ANDROID_KABI_RESERVE(1);|#if defined(CONFIG_POSIX_MQUEUE)\n\tANDROID_KABI_USE(1, unsigned long mq_bytes);\n#else\n\tANDROID_KABI_RESERVE(1);\n#endif|g' "$USER_H"
            echo "✅ [KABI 修复] 成功利用 ANDROID_KABI_USE(1, ...) 注入 mq_bytes 成员！"
          else
            # 如果没有找到 KABI 宏（说明是较老或未强制 KABI 的内核），则直接在合适位置补齐
            echo "⚠️ 未在 user.h 中发现 KABI 限制，正在执行直接注入机制..."
            # 在 locked_shm 上方注入
            sed -i '/unsigned long locked_shm;/i #if defined(CONFIG_POSIX_MQUEUE)\n\tunsigned long mq_bytes;\n#endif' "$USER_H"
            echo "✅ [传统修复] 成功直接注入 mq_bytes！"
          fi

          echo "==== 3. 验证代码修改状态 ===="
          git diff "$USER_H"
          git status
      
      # - name: 3.5 调整 user_struct 结构体, 避免补丁冲突
      #   run: |
      #     cd kernel-src
          
          # echo "==== 1. 绕过 Kconfig 中对 NAMESPACES 和 SYSVIPC 的 kABI 限制 ===="
          # sed -i '/config SYSVIPC/,/config/ { /depends on !ANDROID_KABI_RESERVE/d }' init/Kconfig
          # sed -i '/config SYSVIPC_SYSCTL/,/config/ { /depends on !ANDROID_KABI_RESERVE/d }' init/Kconfig
          # sed -i '/config IPC_NS/,/config/ { /depends on !ANDROID_KABI_RESERVE/d }' init/Kconfig
          # sed -i '/config PID_NS/,/config/ { /depends on !ANDROID_KABI_RESERVE/d }' init/Kconfig
          # sed -i '/config POSIX_MQUEUE/,/config/ { /depends on !ANDROID_KABI_RESERVE/d }' init/Kconfig

          # echo "==== 2. 修改 sched.h 以兼容 POSIX_MQUEUE 的 kABI 预留 ===="
          # sed -i 's/ANDROID_KABI_RESERVE(1);/#if !defined(CONFIG_POSIX_MQUEUE)\n\tANDROID_KABI_RESERVE(1);\n#endif/' include/linux/sched.h

          # echo "==== 3. 动态调整 user_struct 结构体避免 002 补丁冲突 ===="
          # sed -i 's/ANDROID_KABI_RESERVE(1);/#if !defined(CONFIG_POSIX_MQUEUE)\n\tANDROID_KABI_RESERVE(1);\n#endif/' include/linux/sched/user.h

          # echo "==== 4. 动态调整 mqueue.c 兼容代码 ===="
          # sed -i 's/current->fs = sh->saved_fs;/current->fs = current->nsproxy->mnt_ns->root->mnt->mnt_sb->s_fs_info;/g' ipc/mqueue.c

          # echo "==== 5. 【降维打击】批量打包修复高通 techpack datarmnet 路径问题 ===="
          # # 创建全局 trace 目录
          # mkdir -p include/trace/
          # 
          # # 使用 find 深度遍历，强行把该目录下所有头文件的 TRACE_INCLUDE_PATH 全部修正
          # # 同时，不管三七二十一，把里面所有的 .h 文件全部软链接到内核主树中
          # if [ -d techpack/datarmnet/core ]; then
          #   find techpack/datarmnet/core -type f -name "*.h" | while read -r header; do
          #     # 修正宏定义路径
          #     sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../techpack/datarmnet/core|g' "$header"
          #     
          #     # 建立绝对路径软链接，防止编译器迷路
          #     filename=$(basename "$header")
          #     ln -sf "$GITHUB_WORKSPACE/kernel-src/$header" "include/trace/$filename"
          #   done
          # fi

          # echo "==== 验证高通网卡驱动批量修复情况 ===="
          # ls -l include/trace/rmnet_trace.h || true
          # ls -l include/trace/wda.h || true
          
          # echo "==== 验证代码动态修改情况 ===="
          # git diff include/linux/sched/user.h || true

      - name: 4. 智能检索并替换 gki_defconfig 满足 DroidSpaces GKI
        run: |
          cd kernel-src
          DEFCONFIG="arch/arm64/configs/gki_defconfig"

          # 定义一个智能替换/追加的函数
          set_config() {
            local config="$1"
            local value="$2"
            
            # 1. 如果配置项被注释了 (例如 # CONFIG_XXX is not set)，强行替换为 CONFIG_XXX=y
            if grep -q "# $config is not set" "$DEFCONFIG"; then
              sed -i "s|# $config is not set|$config=$value|g" "$DEFCONFIG"
              echo "[替换成功] $config=$value (原为未设置)"
            # 2. 如果配置项已经是别的值，强行覆盖
            elif grep -q "$config=" "$DEFCONFIG"; then
              sed -i "s|$config=.*|$config=$value|g" "$DEFCONFIG"
              echo "[覆盖成功] $config=$value"
            # 3. If 如果文件中完全没有这个配置，则在末尾追加
            else
              echo "$config=$value" >> "$DEFCONFIG"
              echo "[追加成功] $config=$value (原文件中缺失)"
            fi
          }

          echo "==== 开始精准注入 DroidSpaces 核心与推荐配置 ===="
          # IPC
          set_config "CONFIG_SYSVIPC" "y"
          set_config "CONFIG_POSIX_MQUEUE" "y"

          # Namespaces
          set_config "CONFIG_IPC_NS" "y"
          set_config "CONFIG_PID_NS" "y"

          # HW Access Support
          set_config "CONFIG_DEVTMPFS" "y"

          # Networking (Enhanced NAT support)
          set_config "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE" "y"

          # --- Optional but recommended configs ---
          set_config "CONFIG_USER_NS" "y"
          set_config "CONFIG_NETFILTER_XT_TARGET_REJECT" "y"
          set_config "CONFIG_NETFILTER_XT_TARGET_LOG" "y"
          set_config "CONFIG_NETFILTER_XT_MATCH_RECENT" "y"

          # Fail2ban support
          set_config "CONFIG_IP_SET" "y"
          set_config "CONFIG_IP_SET_HASH_IP" "y"
          set_config "CONFIG_IP_SET_HASH_NET" "y"
          set_config "CONFIG_NETFILTER_XT_SET" "y"

          # NixOS / tmpfs support
          # set_config "CONFIG_TMPFS_POSIX_ACL" "y"
          # set_config "CONFIG_TMPFS_XATTR" "y"

          echo "==== 检查部分核心修改结果 ===="
          grep -E "CONFIG_SYSVIPC|CONFIG_POSIX_MQUEUE|CONFIG_USER_NS|CONFIG_PID_NS" "$DEFCONFIG" || true

      - name: 5. 极速拉取 LineageOS 官方配套 Clang 编译器 (r416183b)
        run: |
          # 直接克隆 20.0 版本的官方预编译工具链，避免 wget 400 错误
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git clang

      - name: 6. 执行内核编译 (使用 AOSP 交叉编译链)
        run: |
          cd kernel-src
          
          # 1. 彻底清理之前残留的编译产物
          make mrproper
          
          # 2. 生成配置文件
          make ARCH=arm64 gki_defconfig
          
          # 3. 声明编译器环境变量
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          MAKE_FLAGS="
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1
          "

          echo "==== 开始多线程编译内核本体 (vmlinux & Image) ===="
          make -j$(nproc) $MAKE_FLAGS Image || exit 1

          echo "==== 开始多线程编译外置驱动模块 (允许忽略特定符号未定义) ===="
          # 核心技巧：通过向 KBUILD_EXTRA_SYMBOLS 或 KBUILD_MODPOST_WARN 注入参数
          # 强制让 MODPOST 把 undefined 错误降级为 WARNING 警告，从而顺利生成驱动模块 .ko 文件
          make -j$(nproc) $MAKE_FLAGS modules KBUILD_MODPOST_WARN=1 > build_log.txt 2>&1 || EXIT_CODE=$?

          if [ ! -z "$EXIT_CODE" ]; then
            echo "=============================================="
            echo "❌ 编译失败！正在为你筛选最关键的报错信息..."
            echo "=============================================="
            grep -i -C 5 "error:" build_log.txt || tail -n 100 build_log.txt
            exit 1
          else
            echo "=============================================="
            echo "🎉 编译成功！所有内核与驱动模块链接完毕！"
            echo "=============================================="
          fi
      - name: 7. 恢复项目中自带 AIK-Linux 的执行权限
        run: |
          # 赋予所有脚本和二进制文件可执行权限
          chmod +x AIK-Linux/unpackimg.sh AIK-Linux/repackimg.sh AIK-Linux/cleanup.sh AIK-Linux/bin/linux/x86_64/*
      - name: 8. 自动解包原本的 boot.img 并替换新内核
        run: |
          # 1. 检查项目根目录下是否存在原厂 boot.img
          if [ ! -f "boot.img" ]; then
            echo "❌ 错误：未在项目根目录下找到用于替换的 boot.img 文件！"
            echo "💡 请将你手机原本可正常开机的 boot.img 命名为 boot.img，并放入 GitHub 仓库根目录后再运行。"
            exit 1
          fi

          # 2. 清理 AIK 残留，并将 boot 解包
          cd AIK-Linux
          ./cleanup.sh
          ./unpackimg.sh boot.img

          # 3. 用刚刚编译出来的 Image 替换解包后的内核文件
          # 编译出的 Image 路径位于 ../kernel-src/arch/arm64/boot/Image
          NEW_KERNEL="$GITHUB_WORKSPACE/kernel-src/arch/arm64/boot/Image"
          if [ -f "$NEW_KERNEL" ]; then
            cp "$NEW_KERNEL" split_img/boot.img-kernel
            echo "✅ 成功将新编译的内核 Image 替换进 split_img/"
          else
            echo "❌ 错误：未找到编译生成的内核本体 Image 文件！"
            exit 1
          fi

          # 4. 重新打包生成新镜像 image-new.img
          ./repackimg.sh
          
          # 5. 将新生成的 boot.img 移动到外层准备收集
          cp image-new.img ../boot-new.img
          ./cleanup.sh
          echo "🎉 新 boot 镜像打包成功: boot-new.img"
      
      - name: 7. 收集最终产物
        run: |
          mkdir -p out_artifacts
          
          # 1. 收集最新打包好的 boot-new.img
          if [ -f "boot-new.img" ]; then
            cp boot-new.img out_artifacts/
            echo "[+] 成功收集最终镜像: boot-new.img"
          fi
          
          # 2.收集内核核心镜像
          if [ -f kernel-src/arch/arm64/boot/Image.gz ]; then
            cp kernel-src/arch/arm64/boot/Image.gz out_artifacts/
            echo "[+] 成功收集内核: Image.gz"
          elif [ -f kernel-src/arch/arm64/boot/Image ]; then
            cp kernel-src/arch/arm64/boot/Image out_artifacts/
            echo "[+] 成功收集内核: Image"
          fi
          
          # 3.收集设备树覆盖层 (dtbo.img - 高通平台刷写必需)
          if [ -f kernel-src/arch/arm64/boot/dtbo.img ]; then
            cp kernel-src/arch/arm64/boot/dtbo.img out_artifacts/
            echo "[+] 成功收集设备树: dtbo.img"
          fi
          
          # 4. 收集编译出来的驱动模块 (.ko 文件)
          find kernel-src/out_artifacts/ -name "*.ko" -exec cp {} out_artifacts/ \;
          echo "[+] 驱动模块收集完毕"

      - name: 8. 上传编译包到本运行记录 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Xperia-10IV-DroidSpaces-Kernel
          path: out_artifacts/*
