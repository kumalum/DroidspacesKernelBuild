name: Build Xperia 10 IV DroidSpaces Kernel

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 优化磁盘空间并安装构建依赖
        run: |
          sudo docker image prune -a -f
          sudo docker container prune -f
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 2. 克隆当前仓库 (用于获取 patches 目录)
        uses: actions/checkout@v4
      
      - name: 2.5 克隆 LineageOS 索尼 SM6375 内核源码 (分支 lineage-23.2)
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_sony_sm6375.git kernel-src
      
      - name: 3. 自动应用 DroidSpaces 补丁与 KABI 智能修复
        run: |
          cd kernel-src

          PATCH_DIR="$GITHUB_WORKSPACE/patches"
          cp $PATCH_DIR/00*.patch ./
          echo "==== 正在应用 001 kABI 修复补丁 ===="
          patch -p1 < 001-fix_sysvipc.patch
          
          echo "==== 正在应用 002 POSIX Queue 补丁 ===="
          if patch -p1 < 002-posix_mqueue.patch > /dev/null; then
            :
          else
            TARGET_FILE="include/linux/sched/user.h"
            
            sed -i '/struct ratelimit_state ratelimit;/ {
                n
                /ANDROID_KABI_RESERVE(1);/ {
                    n
                    /ANDROID_KABI_RESERVE(2);/ {
                        n
                        /ANDROID_OEM_DATA_ARRAY(1, 2);/ {
                            # 匹配到了连续的三行，执行替换
                            i\
            #if defined(CONFIG_POSIX_MQUEUE)\
            \tANDROID_KABI_USE(1, unsigned long mq_bytes);\
            \tANDROID_KABI_RESERVE(2);\
            \tANDROID_OEM_DATA_ARRAY(1, 2);\
            #else\
            \tANDROID_KABI_RESERVE(1);\
            \tANDROID_KABI_RESERVE(2);\
            \tANDROID_OEM_DATA_ARRAY(1, 2);\
            #endif
                            d
                        }
                    }
                }
            }' "$TARGET_FILE"
            
            # 上面的精确匹配如果因为空格/缩进失败，以下提供一个更强力的后备替换方案（针对标准缩进）
            if ! grep -q "CONFIG_POSIX_MQUEUE" "$TARGET_FILE"; then
                echo "⚠️ 精确匹配未成功，尝试执行结构体块替换..."
                
                # 备份原文件
                cp "$TARGET_FILE" "${TARGET_FILE}.bak"
                
                # 使用 Python 或更简单的 sed 直接整块替换（这里用不依赖环境的 sed 替换大法）
                # 寻找 ratelimit 后面接 KABI_RESERVE 的部分进行直接重写
                sed -i '/struct ratelimit_state ratelimit;/,/ANDROID_OEM_DATA_ARRAY(1, 2);/c\
            \tstruct ratelimit_state ratelimit;\
            #if defined(CONFIG_POSIX_MQUEUE)\
            \tANDROID_KABI_USE(1, unsigned long mq_bytes);\
            \tANDROID_KABI_RESERVE(2);\
            \tANDROID_OEM_DATA_ARRAY(1, 2);\
            #else\
            \tANDROID_KABI_RESERVE(1);\
            \tANDROID_KABI_RESERVE(2);\
            \tANDROID_OEM_DATA_ARRAY(1, 2);\
            #endif' "$TARGET_FILE"
            fi
            
            # 4. 验证最终结果
            if grep -q "CONFIG_POSIX_MQUEUE" "$TARGET_FILE"; then
                echo "✅ 修复成功！"
                # 清理可能残留的补丁拒绝文件
                [ -f "${TARGET_FILE}.rej" ] && rm "${TARGET_FILE}.rej"
                [ -f "${TARGET_FILE}.bak" ] && rm "${TARGET_FILE}.bak"
            else
                echo "❌ 修复失败，文件缩进或内容可能与预期不符，建议通过 'git diff' 或手动检查。"
            fi
          fi


      - name: 4. 智能检索并替换 gki_defconfig 满足 DroidSpaces GKI
        run: |
          cd kernel-src
          DEFCONFIG="arch/arm64/configs/gki_defconfig"

          # 定义一个智能替换/追加的函数
          set_config() {
            local config="$1"
            local value="$2"
            
            # 1. 如果配置项被注释了 (例如 # CONFIG_XXX is not set)，强行替换为 CONFIG_XXX=y
            if grep -q "# $config is not set" "$DEFCONFIG"; then
              sed -i "s|# $config is not set|$config=$value|g" "$DEFCONFIG"
              echo "[替换成功] $config=$value (原为未设置)"
            # 2. 如果配置项已经是别的值，强行覆盖
            elif grep -q "$config=" "$DEFCONFIG"; then
              sed -i "s|$config=.*|$config=$value|g" "$DEFCONFIG"
              echo "[覆盖成功] $config=$value"
            # 3. If 如果文件中完全没有这个配置，则在末尾追加
            else
              echo "$config=$value" >> "$DEFCONFIG"
              echo "[追加成功] $config=$value (原文件中缺失)"
            fi
          }

          echo "==== 开始精准注入 DroidSpaces 核心与推荐配置 ===="
          # IPC
          set_config "CONFIG_SYSVIPC" "y"
          set_config "CONFIG_POSIX_MQUEUE" "y"

          # Namespaces
          set_config "CONFIG_IPC_NS" "y"
          set_config "CONFIG_PID_NS" "y"
          
          # NixOS / tmpfs support
          # set_config "CONFIG_TMPFS_POSIX_ACL" "y"
          # set_config "CONFIG_TMPFS_XATTR" "y"

      - name: 5. 极速拉取 LineageOS 官方配套 Clang 编译器 (r416183b)
        run: |
          # 直接克隆 20.0 版本的官方预编译工具链，避免 wget 400 错误
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git clang

      - name: 6. 执行内核编译 (使用 AOSP 交叉编译链)
        run: |
          cd kernel-src
          
          # 1. 彻底清理之前残留的编译产物
          make mrproper
          
          # 2. 生成配置文件
          make ARCH=arm64 gki_defconfig
          
          # 3. 声明编译器环境变量
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          MAKE_FLAGS="
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1
          "

          echo "==== 开始多线程编译内核本体 (vmlinux & Image) ===="
          make -j$(nproc) $MAKE_FLAGS Image || exit 1

          echo "==== 开始多线程编译外置驱动模块 (允许忽略特定符号未定义) ===="
          # 核心技巧：通过向 KBUILD_EXTRA_SYMBOLS 或 KBUILD_MODPOST_WARN 注入参数
          # 强制让 MODPOST 把 undefined 错误降级为 WARNING 警告，从而顺利生成驱动模块 .ko 文件
          make -j$(nproc) $MAKE_FLAGS modules KBUILD_MODPOST_WARN=1 > build_log.txt 2>&1 || EXIT_CODE=$?

          if [ ! -z "$EXIT_CODE" ]; then
            echo "=============================================="
            echo "❌ 编译失败！正在为你筛选最关键的报错信息..."
            echo "=============================================="
            grep -i -C 5 "error:" build_log.txt || tail -n 100 build_log.txt
            exit 1
          else
            echo "=============================================="
            echo "🎉 编译成功！所有内核与驱动模块链接完毕！"
            echo "=============================================="
          fi
      - name: 7. 恢复项目中自带 AIK-Linux 的执行权限
        run: |
          # 赋予所有脚本和二进制文件可执行权限
          chmod +x AIK-Linux/unpackimg.sh AIK-Linux/repackimg.sh AIK-Linux/cleanup.sh AIK-Linux/bin/linux/x86_64/*
      
      - name: 8. 自动解包原本的 boot.img 并替换新内核
        run: |
          # 1. 清理 AIK 残留，并将 boot 解包
          cd AIK-Linux
          ./cleanup.sh
          ./unpackimg.sh boot.img

          # 2. 用刚刚编译出来的 Image 替换解包后的内核文件
          # 编译出的 Image 路径位于 ../kernel-src/arch/arm64/boot/Image
          NEW_KERNEL="$GITHUB_WORKSPACE/kernel-src/arch/arm64/boot/Image"
          if [ -f "$NEW_KERNEL" ]; then
            cp "$NEW_KERNEL" split_img/boot.img-kernel
            echo "✅ 成功将新编译的内核 Image 替换进 split_img/"
          else
            echo "❌ 错误：未找到编译生成的内核本体 Image 文件！"
            exit 1
          fi

          # 4. 重新打包生成新镜像 image-new.img
          ./repackimg.sh
          
          # 5. 将新生成的 boot.img 移动到外层准备收集
          cp image-new.img ../boot-new.img
          ./cleanup.sh
          echo "🎉 新 boot 镜像打包成功: boot-new.img"
      
      - name: 7. 收集最终产物
        run: |
          
          mkdir -p out_artifacts
          
          # 1. 收集最新打包好的 boot-new.img
          if [ -f "boot-new.img" ]; then
            cp boot-new.img out_artifacts/
            echo "[+] 成功收集最终镜像: boot-new.img"
          fi
          
          # 2. 收集内核本体 Image 以防万一
          cp kernel-src/arch/arm64/boot/Image out_artifacts/Image_raw
          
          # 3. 收集编译出来的驱动模块 (.ko 文件)
          # find out_artifacts/ -name "*.ko" -exec cp {} out_artifacts/ \;
          # echo "[+] 驱动模块收集完毕"

      - name: 8. 上传编译包到本运行记录 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Xperia-10IV-DroidSpaces-Kernel
          path: out_artifacts/*
