name: 构建未修改的内核

on:
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 优化磁盘空间并安装构建依赖
        run: |
          sudo docker image prune -a -f
          sudo docker container prune -f
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

      - name: 2.5 克隆 LineageOS 索尼 SM6375 内核源码 (分支 lineage-23.2)
        run: |
          git clone --depth=1 -b lineage-23.2 https://github.com/LineageOS/android_kernel_sony_sm6375.git kernel-src
      
      # - name: 2.5.5 修复高通 techpack datarmnet 找不到 rmnet_trace.h 的问题
      #   run: |
      #     
      #     cd kernel-src 
      #     
      #     # 使用 find 深度遍历，强行把该目录下所有头文件的 TRACE_INCLUDE_PATH 全部修正
      #     # 同时，不管三七二十一，把里面所有的 .h 文件全部软链接到内核主树中
      #     if [ -d techpack/datarmnet/core ]; then
      #       find techpack/datarmnet/core -type f -name "*.h" | while read -r header; do
      #         # 修正宏定义路径
      #         sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../techpack/datarmnet/core|g' "$header"
      #         
      #         # 建立绝对路径软链接，防止编译器迷路
      #         filename=$(basename "$header")
      #         ln -sf "$GITHUB_WORKSPACE/kernel-src/$header" "include/trace/$filename"
      #       done
      #     fi

      #     echo "==== 验证高通网卡驱动批量修复情况 ===="
      #     ls -l include/trace/rmnet_trace.h || true
      #     ls -l include/trace/wda.h || true


      - name: 4. 环境补全与下载配置联合工具链 (LLVM + GCC 4.9)
        run: |
          # 1. 核心修复：为 Ubuntu Actions 虚拟机开启 32 位运行库支持（防止 SDLLVM 爆 127 错误）
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libc6:i386 libncurses5:i386 libstdc++6:i386 lib32z1

          # 2. 创建干净的本地存放目录
          mkdir -p $GITHUB_WORKSPACE/llvm-toolchain
          mkdir -p $GITHUB_WORKSPACE/gcc-toolchain

          # 3. 下载并解压 LLVM 工具链 (SDLLVM 10.0.9)
          wget -q https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/llvm-arm-toolchain-ship-10.0.9.tar.gz
          tar -zxf llvm-arm-toolchain-ship-10.0.9.tar.gz -C $GITHUB_WORKSPACE/llvm-toolchain --strip-components=1 2>/dev/null || tar -zxf llvm-arm-toolchain-ship-10.0.9.tar.gz -C $GITHUB_WORKSPACE/llvm-toolchain

          # 4. 下载并解压配套的 GCC 4.9 工具链
          wget -q https://github.com/ravindu644/Android-Kernel-Tutorials/releases/download/toolchains/aarch64-linux-android-4.9-Linux-5.4.tar.gz
          tar -zxf aarch64-linux-android-4.9-Linux-5.4.tar.gz -C $GITHUB_WORKSPACE/gcc-toolchain --strip-components=1 2>/dev/null || tar -zxf aarch64-linux-android-4.9-Linux-5.4.tar.gz -C $GITHUB_WORKSPACE/gcc-toolchain

          # 5. 动态寻找 bin 目录并注入系统环境变量 (确保不管怎么套娃都能找到)
          LLVM_BIN=$(find $GITHUB_WORKSPACE/llvm-toolchain -type d -name "bin" | head -n 1)
          GCC_BIN=$(find $GITHUB_WORKSPACE/gcc-toolchain -type d -name "bin" | head -n 1)

          echo "$LLVM_BIN" >> $GITHUB_PATH
          echo "$GCC_BIN" >> $GITHUB_PATH

          echo "==== 验证工具链版本 ===="
          $LLVM_BIN/clang --version
          $GCC_BIN/aarch64-linux-android-gcc --version

      - name: 5. 联合调用 LLVM 与 GCC 4.9 编译内核 (包含 DroidSpaces 支持)
        run: |
          cd kernel-src
          
          # 1. 定义核心环境变量
          export O=out
          export ARCH=arm64
          export SUBARCH=arm64
          
          # 2. 交叉编译前缀精准对齐（核心改动）
          # 汇编和链接完全交给刚刚解压的 aarch64-linux-android- 4.9 编译器
          export CROSS_COMPILE="$GITHUB_WORKSPACE/gcc-toolchain/bin/aarch64-linux-android-"
          export CLANG_TRIPLE=aarch64-linux-gnu-
          
          # 3. 生成配置
          make $DEFCONFIG_NAME CC=clang
          
          echo "==== 开始执行混编流程 ===="
          # 4. 联合编译：LLVM 负责 C 语言，GCC 负责汇编和链接
          make -j$(nproc --all) \
               CC=clang \
               CROSS_COMPILE=$CROSS_COMPILE \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               Image
               
          echo "==== 编译检查 ===="
          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "🎉 使用官方推荐工具链编译成功！"
            mkdir -p arch/arm64/boot/
            cp out/arch/arm64/boot/Image arch/arm64/boot/Image
          else
            echo "❌ 错误：未能在目标位置找到 Image 文件！"
            exit 1
          fi

      - name: 7. 收集最终产物
        run: |
          
          mkdir -p out_artifacts
          # 2. 收集内核本体 Image 以防万一
          cp kernel-src/arch/arm64/boot/Image out_artifacts/Image_raw
          

      - name: 8. 上传编译包到本运行记录 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: Xperia-10IV-DroidSpaces-Kernel
          path: out_artifacts/*
