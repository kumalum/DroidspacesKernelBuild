name: sony sm6375 kernel-src
description: 'Sony sm6375 内核代码'
runs:
  using: "composite"
  steps:    
    - name: Get Latest Kernel Commit Hash
      id: get-hash
      run: |
        # 远程获取 LineageOS 该分支最新的 commit hash
        LATEST_HASH=$(git ls-remote https://github.com refs/heads/lineage-23.2 | awk '{print $1}')
        echo "最新提交哈希: $LATEST_HASH"
        # 将哈希值存入 GitHub Actions 的环境变量输出中
        echo "kernel_hash=$LATEST_HASH" >> $GITHUB_OUTPUT

    - name: 设置内核源码缓存
      id: cache-kernel
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel-src
        # Key 包含了分支名和最新的哈希值。如果远程代码更新了，哈希变了，缓存就会自动失效并重新下载。
        key: kernel-sony-sm6375-lineage-23.2-${{ steps.get-hash.outputs.kernel_hash }}
        # 兜底恢复键：如果精确的哈希没对上，先恢复上一次该分支的旧代码，这样 checkout 时只需拉取增量更新，速度极快
        restore-keys: |
          kernel-sony-sm6375-lineage-23.2-

    # 3. 只有在缓存未命中（代码有更新或首次运行）时，才执行 checkout
    - name: Checkout Sony sm6375 Kernel Source
      if: steps.cache-kernel.outputs.cache-hit != 'true'
      uses: actions/checkout@v4
      with:
        repository: 'LineageOS/android_kernel_sony_sm6375'
        ref: 'lineage-23.2'
        fetch-depth: 1
        path: 'kernel-src'
