name: bulid sony sm6375 kernel-src
description: '编译 Sony sm6375 内核'
runs:
  using: "composite"
  steps:
    - name: 编译报错处理
      uses: ./.github/patches

    - name: 编译内核
      run: | 
          cd kernel-src
          make mrproper
               
          # 基础GKI 框架 + 高通 holi 专属驱动 + DroidSpaces 修正
          scripts/kconfig/merge_config.sh -m arch/arm64/configs/vendor/holi-qgki_defconfig \
            arch/arm64/configs/diffconfig/common.config \
            ../droidspaces.config
          
          make olddefconfig
          
          echo "==== 开始使用纯 LLVM 多线程编译内核本体 (Image) ===="
          # 使用 tee 将编译日志同时输出到终端和文件，并捕获退出状态
          set -o pipefail
          make -j$(nproc) Image 2>&1 | tee build_output.log || EXIT_CODE=$?
          # 如果编译失败，倒带日志，精准筛选出 error 核心上下文，防止被 GitHub 抹除
          if [ ! -z "$EXIT_CODE" ]; then
            echo "===================================================="
            echo "❌ 编译崩溃！正在为你精准提取引发失败的底层源码报错："
            echo "===================================================="
            grep -B 3 -A 5 -i "error:" build_output.log || tail -n 100 build_output.log
            exit 1
          else
            echo "🎉 内核本体编译成功！"
      
    - name: 收集编译后的产物
      run: |
        mkdir -p $OUTPATH 
        
        NEW_KERNEL="kernel-src/arch/arm64/boot/Image"
        if [ -f "$NEW_KERNEL" ]; then
          cp "$NEW_KERNEL" out_artifacts/Image
          echo "✌️ 内核收集成功"
        else
          echo "❌ 未找到编译生成的内核本体 Image 文件！"
          exit 1
        fi
        # echo "=== 收集编译出来的驱动模块 (.ko 文件)==="
        # find kernel-src/out -name "*.ko" -exec cp {} out_artifacts/ \;
        # echo "[+] 驱动模块收集完毕"
