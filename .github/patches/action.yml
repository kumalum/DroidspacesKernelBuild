name: sony sm6375 patches
description: '修复编译 sony sm6375 内核时的错误'
runs:
  using: "composite" # 声明这是一个复合动作
  steps:
    - name: 向 Makefile 添加 KCFLAGS 环境参数
      if: true
      shell: bash
      run: |
        cd kernel-src

        echo "=== 🎯 精准注入特定警告降级标志 (KCFLAGS) ==="
        MAKEFILE_PATH="Makefile"
        if [ -f "$MAKEFILE_PATH" ]; then
          # 在 Makefile 的第一行直接注入全局环境参数 KCFLAGS
          # 显式指定 -Wno-error=implicit-function-declaration 和 -Wno-error=incompatible-pointer-types
          # 这样整个构建系统在编译所有子目录的 .c 文件时，都会强制继承这两个不拦截编译的规则
          sed -i '1i KCFLAGS += -Wno-error=implicit-function-declaration -Wno-error=incompatible-pointer-types' "$MAKEFILE_PATH"
          
          echo "✅ 根目录 Makefile 已成功注入 KCFLAGS 降级参数！"
        else
          echo "❌ 未找到根目录 Makefile"
          exit 1
        fi

    
    - name: 修复 WALT 调度器在 O=out 编译时的 trace.h 寻路错误
      if: true
      shell: bash
      run: |
        cd kernel-src 
        if [ -f kernel/sched/walt/trace.h ]; then
          sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../kernel/sched/walt|g' kernel/sched/walt/trace.h
          echo "✅ WALT 寻路路径修正成功！"
        fi
    
    - name: 修复找不到网卡 .h 文件与 TRACE_INCLUDE_PATH 的问题
      shell: bash
      run: |
        cd kernel-src
        
        if [ -d techpack/datarmnet/core ]; then
          find techpack/datarmnet/core -type f -name "*.h" | while read -r header; do
            sed -i 's|#define TRACE_INCLUDE_PATH .|#define TRACE_INCLUDE_PATH ../../techpack/datarmnet/core|g' "$header"
            filename=$(basename "$header")
            ln -sf "$GITHUB_WORKSPACE/kernel-src/$header" "include/trace/$filename"
          done
        fi
    
        # echo "==== 验证高通网卡驱动批量修复情况 ===="
        # ls -l include/trace/rmnet_trace.h || true
        # ls -l include/trace/wda.h || true

    - name: 使用 awk 注入 QN5965 标定宏
      shell: bash
      run: |
        cd kernel-src
        VADC_HEADER="drivers/iio/adc/qcom-vadc-common.h"
        if [ -f "$VADC_HEADER" ]; then
          # 使用 awk 锁定目标行并在其下方精准插入，不受空格/缩进干扰
          awk '
          /SCALE_HW_CALIB_BATT_THERM_100K,/ {
              print $0;
              print "\tSCALE_HW_CALIB_BATT_THERM_100K_QN5965,";
              print "\tSCALE_HW_CALIB_THERM_100K_QN5965,";
              next;
          }
          { print $0; }
          ' "$VADC_HEADER" > "${VADC_HEADER}.tmp" && mv "${VADC_HEADER}.tmp" "$VADC_HEADER"

          echo "==== 🔍 动态验证头文件修改结果 ===="
          grep -B 1 -A 3 "SCALE_HW_CALIB_BATT_THERM_100K_QN5965" "$VADC_HEADER" || { echo "❌ 注入验证失败！"; exit 1; }
          echo "✅ 宏定义注入成功，且通过 CI 断言验证！"
        else
          echo "❌ 未找到 $VADC_HEADER 头文件"
          exit 1
        fi
    - name: 解决 qcom-vadc-common.c 的未使用/重定义冲突
      shell: bash
      run: |
        cd kernel-src
        
        VADC_SRC="drivers/iio/adc/qcom-vadc-common.c"
        if [ -f "$VADC_SRC" ]; then
          # 1. 依然在 1641 行对冲突函数进行重命名
          sed -i '1641s/qcom_vadc_scale_hw_calib_batt_therm_100/qcom_vadc_scale_hw_calib_batt_therm_100_sony_murray_only/' "$VADC_SRC"
          
          # 2. 关键一步：在 1641 行前插入 __maybe_unused 属性，堵住编译器的警告
          sed -i '1641s/static int/__maybe_unused static int/' "$VADC_SRC"

          echo "✅ qcom-vadc-common.c 已通过 __maybe_unused 彻底修复！"
        else
          echo "❌ 未找到 $VADC_SRC 源文件"
          exit 1
        fi
        
      
    - name: 修复 step-chg-jeita.c 缺少的 5 参数函数声明
      if: false
      shell: bash
      run: |
        cd kernel-src

        JEITA_SRC="drivers/power/supply/qcom/step-chg-jeita.c"
        if [ -f "$JEITA_SRC" ]; then
          # 强行还原文件，洗掉之前错误的 4 参数声明
          git checkout -- "$JEITA_SRC" 2>/dev/null || true
          
          # 使用通用类型 (void *) 和 5 个参数来适配索尼的魔改函数
          # 直接插入到文件的第一行，并前置声明 struct device_node 解决可见性警告
          sed -i '1i struct device_node;\nextern int read_range_data_from_node(struct device_node *node, const char *propname, void *buf, int size, int extra);' "$JEITA_SRC"
          
          echo "✅ step-chg-jeita.c 5参数函数声明修复完毕！"
        else
          echo "❌ 未找到 $JEITA_SRC 源文件"
        fi
        
    - name: 修复 smb5-lib.c 全局残留的死 goto 标签
      if: false
      shell: bash
      run: |
        cd kernel-src
        SMB_SRC="drivers/power/supply/qcom/smb5-lib.c"
        if [ -f "$SMB_SRC" ]; then
          # 1. 强行还原文件，确保洗掉之前按行号修改带来的错位
          git checkout -- "$SMB_SRC" 2>/dev/null || true
          
          # 2. 在文件开头注入 set_sdp_current 的 extern 声明
          sed -i '1i struct smb_charger;\nextern int set_sdp_current(struct smb_charger *chg, int icl_ua);' "$SMB_SRC"
          
          # 3. 🚨 重点：全局替换！把该文件内所有 goto unsuspend; 统统替换为 return rc;
          # 这样不管索尼写了多少个，都能一次性消灭干净，且逻辑完美闭环
          sed -i 's/goto unsuspend;/return rc;/g' "$SMB_SRC"
          
          # 4. 屏蔽未定义的工作队列初始化
          sed -i '/smblib_info_charge_status_work/s/^/\/\/ /' "$SMB_SRC"

          echo "✅ smb5-lib.c 的全局死标签和断层已全部强行修复完毕！"
        else
          echo "❌ 未找到 $SMB_SRC 源文件"
        fi

    - name: 修复 qpnp-qg.c 中未使用的电池寿命函数警告
      if: false
      shell: bash
      run: |
        cd kernel-src
        QG_SRC="drivers/power/supply/qcom/qpnp-qg.c"
        if [ -f "$QG_SRC" ]; then
          # 锁定第 2090 行的冲突静态函数，为其注入 __maybe_unused 属性
          # 这样即使该函数在 Holi 平台没被调用，Clang 编译器也不会再当作错误拦截
          sed -i '2090s/static int/__maybe_unused static int/' "$QG_SRC"

          echo "✅ qpnp-qg.c 的未使用函数警告已通过 __maybe_unused 完美修复！"
        else
          echo "❌ 未找到 $QG_SRC 源文件"
        fi
    - name: 修复 fg-alg.c 算法函数参数不匹配与死标签报错
      if: false
      shell: bash
      run: |
        cd kernel-src
        FG_SRC="drivers/power/supply/qcom/fg-alg.c"
        if [ -f "$FG_SRC" ]; then
          # 1. 强行还原文件，洗掉上一次改出来的冲突
          git checkout -- "$FG_SRC" 2>/dev/null || true

          # 2. 将魔改函数名替换为原生函数名
          sed -i 's/cap_wt_learning_process_full_data/cap_learning_process_full_data/g' "$FG_SRC"
          
          # 3. 🚨 关键一步：将调用处的第三个参数 batt_soc_cp 删掉，使其符合 2 参数预期
          # 匹配包含 cap_learning_process_full_data 的上下文，移除多余的参数
          sed -i '/cap_learning_process_full_data/,/batt_soc_cp/ { s/,.*batt_soc_cp// }' "$FG_SRC"
          
          # 4. 精准注释掉第 941 行没被使用的 out: 标签
          sed -i '941s/out:/\/\/ out:/' "$FG_SRC"

          echo "✅ fg-alg.c 函数参数修正与死标签修复完毕！"
        else
          echo "❌ 未找到 $FG_SRC 源文件"
        fi
